# Reverse proxy: :80 -> Next.js on 127.0.0.1:3000
#
# Install with:
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/hermes-polymarket.conf
#   sudo nginx -t && sudo systemctl restart nginx
#
# To add HTTPS later (once you point a domain at this instance's IP):
#   sudo dnf install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
# certbot will rewrite this file to add the SSL server block automatically.

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
